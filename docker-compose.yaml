version: '3.8'

services:
  nginx-static:
    image: nginx:alpine
    container_name: et-static
    ports:
      - '${STATIC_PORT}:80'
    volumes:
      - ./static-conf/static:/srv
      - ./static-conf/nginx.conf:/etc/nginx/conf.d/default.conf

  dashboard:
    # image: qobiljon/dashboard:${DASHBOARD_IMG_VER}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: et-dashboard
    network_mode: host
    environment:
      SERVERNAMES: ${SERVERNAMES}
      INTERNAL_IPS: ${INTERNAL_IPS}
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DBNAME: ${POSTGRES_DBNAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      TEST_ACCOUNT_EMAIL: ${TEST_ACCOUNT_EMAIL}
      TEST_ACCOUNT_NAME: ${TEST_ACCOUNT_NAME}
    ports:
      - '8000:8000'
