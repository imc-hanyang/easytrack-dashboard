# Docker Compose file for EasyTrack Dashboard project
# Includes Django, Postgres, and PgAdmin4 containers
# (create the external docker network before running this file)

version: "3.8"

services:
  postgres:
    container_name: easytrack-postgres

    image: postgres:alpine

    environment:
      POSTGRES_DBNAME: ${POSTGRES_DBNAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - "easytrack-postgres-vol:/var/lib/postgresql/data"

    networks:
      - "easytrack-network"

  django:
    container_name: easytrack-django

    build:
      context: .
      dockerfile: Dockerfile

    depends_on:
      - postgres

    environment:
      # Django development server settings
      DEBUG: ${DEBUG}
      SERVERNAMES: ${SERVERNAMES}
      INTERNAL_IPS: ${INTERNAL_IPS}

      # Database credentials
      POSTGRES_HOST: easytrack-postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DBNAME: ${POSTGRES_DBNAME}
      POSTGRES_TEST_DBNAME: ${POSTGRES_TEST_DBNAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      # Google API credentials
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}

      # Django social auth credentials
      SOCIAL_AUTH_GOOGLE_OAUTH2_KEY: ${SOCIAL_AUTH_GOOGLE_OAUTH2_KEY}
      SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET: ${SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET}

      # Django secret key
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}

      # Test account details (app user)
      TEST_ACCOUNT_EMAIL: ${TEST_ACCOUNT_EMAIL}
      TEST_ACCOUNT_NAME: ${TEST_ACCOUNT_NAME}

    ports:
      - "8000:8000"

    networks:
      - "easytrack-network"

  pgadmin4:
    container_name: easytrack-pgadmin4

    image: dpage/pgadmin4

    environment:
      PGADMIN_DEFAULT_EMAIL: easytrack@email.com
      PGADMIN_DEFAULT_PASSWORD: easytrack

    ports:
      - "5050:80"

    volumes:
      - "easytrack-pgadmin4-vol:/var/lib/pgadmin"

    networks:
      - "easytrack-network"

volumes:
  easytrack-postgres-vol:
  easytrack-pgadmin4-vol:


networks:
  easytrack-network:
    external: true
