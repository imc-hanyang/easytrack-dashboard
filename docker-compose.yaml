version: '3.8'

services:
  nginx-static:
    image: nginx:alpine
    container_name: et-static
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./static-server/static:/srv
      - ./static-server/nginx.conf:/etc/nginx/conf.d/default.conf

  postgres:
    image: postgres:alpine
    container_name: et-db
    environment:
      DATABASE_HOST: '${DATABASE_HOST}'
      DATABASE_PORT: '${DATABASE_PORT}'
      POSTGRES_DBNAME: '${DATABASE_NAME}'
      POSTGRES_USER: '${DATABASE_USER}'
      POSTGRES_PASSWORD: '${DATABASE_PASSWORD}'
      PGDATA: /pg-static
    ports:
      - '5432:5432'
    volumes:
      - ./pg_data:/var/lib/postgresql/data
