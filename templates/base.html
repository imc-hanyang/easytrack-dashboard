<!DOCTYPE html>

{% load fix_localhost %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>

    <!-- JQuery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    
    <!-- Bootstrap (CSS and JS) and Roboto font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.2.3/js/bootstrap.min.js"
    integrity="sha512-1/RvZTcCDEUjY/CypiMz+iqqtaoQfAITmNSJY17Myp4Ms5mdxPS5UV7iOfdZoxcGhzFbOm6sntTKJppjvuhg4g=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <!-- Google API and Roboto font -->
    <script src="http://{{ STATIC_HOST|fix_localhost }}:{{ STATIC_PORT }}/js/api.js"></script>
    <link href="https://fonts.googleapis.com/css?family=Roboto&display=swap" rel="stylesheet">
    
    <!-- Icon -->
    <link rel="shortcut icon" href="http://{{ STATIC_HOST|fix_localhost }}:{{ STATIC_PORT }}/images/others//favicon.ico">
    
    <!-- Metadata -->
    <meta name="google-site-verification" content="LlQenU10qxF_Zc7Mr56TrTZjwkgyaj3OtFfJbwKhIs4"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Easytrack</a>
            {% if user.is_authenticated %}
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'campaigns' %}">Campaigns</a>
                    </li>
                    <li class="nav-item">
                        <a id="navBtnLogout" class="nav-link" style="cursor: pointer">Logout</a>
                    </li>
                </ul>
            {% endif %}
        </div>
    </nav>

    <div class="container-fluid mt-3">
        {% block content %}{% endblock %}
    </div>
</body>

<script>
    $(document).ready(function() {
        $("#navBtnLogout").click(function() {
            $.ajax({
                url: "{% url 'logoutApi' %}",
                type: "POST",
                data: {
                    csrfmiddlewaretoken: '{{ csrf_token }}'
                },
                success: function() {
                    window.location.reload();
                }
            });
        });
    });
</script>

</html>
